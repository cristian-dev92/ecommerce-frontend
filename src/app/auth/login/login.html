<div class="login-container">
  <div class="login-card">

    <h2 class="login-title">Iniciar Sesión</h2>
    <p class="login-subtitle">Accede a tu cuenta para gestionar tus pedidos.</p>

    <form [formGroup]="loginForm" class="login-form">

      <!-- Email -->
      <div class="form-group">
        <label for="username">Email</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Tu email"
          [ngClass]="{ 'input-error': loginForm.get('username')?.invalid && loginForm.get('username')?.touched }"
        />
        <p class="error-text" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          Este campo es obligatorio.
        </p>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Tu contraseña"
          [ngClass]="{ 'input-error': loginForm.get('password')?.invalid && loginForm.get('password')?.touched }"
        />
        <p class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña es obligatoria.
        </p>
      </div>

      <!-- Botón -->
      <button
        type="button"
        (click)="onSubmit()"
        [disabled]="loginForm.invalid || isSubmitting"
        class="btn-submit"
      >
        <span *ngIf="!isSubmitting">Iniciar Sesión</span>
        <span *ngIf="isSubmitting" class="loader"></span>
      </button>

      <p class="error-text general-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

    </form>

    <p class="register-text">
      ¿Aún no tienes cuenta?
      <a routerLink="/register">Regístrate aquí</a>
    </p>

  </div>
</div>
