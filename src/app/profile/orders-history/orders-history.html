<h2 class="orders-title">Mis pedidos</h2>

<div *ngIf="orders().length === 0" class="orders-empty">
  No tienes pedidos todavía.
</div>

<div *ngFor="let order of orders()" class="order-card">

  <div class="order-header">
    <p class="order-id">Pedido #{{ order.id }}</p>
    <p class="order-date">Fecha: {{ order.createdAt | date:'short' }}</p>
    <p class="order-status">Estado: {{ order.status }}</p>
  </div>

  <div class="order-items">
    <p class="items-title">Artículos:</p>

    <div *ngFor="let item of order.items" class="order-item">
      <div class="item-left">
      <span class="item-name">{{ item.productName }}</span>
      <span class="item-qty">x{{ item.quantity }}</span>
    </div>
    <span class="item-subtotal">{{ item.subtotal }} €</span>
  </div>

  <div class="order-total">
    Total del pedido: <span>{{ order.total }} €</span>
  </div>

</div>
