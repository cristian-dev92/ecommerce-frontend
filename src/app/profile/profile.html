<h2 class="profile-title">Mi Perfil</h2>

<!-- AVATAR -->
<div class="profile-section">
  <h3 class="section-title">Foto de Perfil</h3>

  <div class="avatar-container">
    <img
      [src]="avatarPreview || auth.user()?.avatarUrl || 'https://via.placeholder.com/150'"
      class="avatar-img"
      alt="Avatar"
    />

    <label for="avatarInput" class="btn-secondary small-btn">
      Cambiar foto
    </label>

    <input id="avatarInput" type="file" (change)="onAvatarSelected($event)" hidden />
  </div>
</div>

<!-- CAMBIAR NOMBRE -->
<div class="profile-section">
  <h3 class="section-title">Cambiar Nombre</h3>

  <form [formGroup]="nameForm" (ngSubmit)="updateName()" class="profile-form">
    <input class="input" formControlName="name" placeholder="Nombre" />
    <button class="btn-primary small-btn">Guardar Nombre</button>
  </form>
</div>

<!-- CAMBIAR EMAIL -->
<div class="profile-section">
  <h3 class="section-title">Cambiar Email</h3>

  <form [formGroup]="emailForm" (ngSubmit)="updateEmail()" class="profile-form">
    <input class="input" formControlName="email" type="email" placeholder="Email" />
    <button class="btn-primary small-btn">Guardar Email</button>
  </form>
</div>

<!-- CAMBIAR CONTRASEÑA -->
<div class="profile-section">
  <h3 class="section-title">Cambiar Contraseña</h3>

  <form [formGroup]="passwordForm" (ngSubmit)="updatePassword()" class="profile-form">
    <input class="input" type="password" placeholder="Contraseña actual" formControlName="currentPassword" />
    <input class="input" type="password" placeholder="Nueva contraseña" formControlName="newPassword" />
    <button class="btn-primary small-btn">Cambiar Contraseña</button>
  </form>
</div>

<!-- DIRECCIÓN -->
<div class="profile-section">
  <h3 class="section-title">Dirección de Envío</h3>

  <form [formGroup]="addressForm" (ngSubmit)="updateAddress()" class="profile-form">
    <input class="input" placeholder="Calle" formControlName="street" />
    <input class="input" placeholder="Ciudad" formControlName="city" />
    <input class="input" placeholder="Código Postal" formControlName="postalCode" />
    <input class="input" placeholder="País" formControlName="country" />
    <button class="btn-primary small-btn">Guardar Dirección</button>
  </form>
</div>

<!-- HISTORIAL DE PEDIDOS -->
<div class="profile-section">
  <h3 class="section-title">Historial de Pedidos</h3>
  <app-orders-history></app-orders-history>
</div>

<!-- ELIMINAR CUENTA -->
<div class="profile-section danger-zone">
  <h3 class="section-title danger-text">Eliminar Cuenta</h3>

  <button (click)="deleteAccount()" class="btn-danger small-btn">
    Eliminar Cuenta
  </button>
</div>
