<nav class="main-navbar">
  <div class="navbar-container">
    
    <div class="nav-left-group">
      <div class="nav-brand" routerLink="/">
        <div class="brand-logo">
          <img src="devshop.ico" alt="DevShop Logo" class="logo-img">
        </div>
        <span class="brand-name">DevShop</span>
      </div>

      <ul class="nav-links">
        <li><a class="nav-link" routerLink="/products" routerLinkActive="active">Productos</a></li>
        @if (auth.isAdmin()) {
          <li><a class="nav-link admin-badge-link" routerLink="/products/create" routerLinkActive="active">Panel Admin</a></li>
        }
      </ul>
    </div>

    <div class="nav-right-group">
      
      <div class="nav-search-bar">
        <form (ngSubmit)="onSearch()">
          <input 
            type="text" 
            placeholder="Buscar..." 
            [ngModel]="searchQuery()"
            (ngModelChange)="searchQuery.set($event)"
            name="search">
          <button type="submit" class="btn-search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </form>
      </div>

      <div class="nav-actions">
        <button class="btn-theme-toggle" (click)="toggleTheme()" title="Cambiar tema">
           @if (isDarkMode()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          }
        </button>
        <button class="btn-cart" (click)="goToCart()" title="Ver carrito">
          <div class="cart-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            @if (cart.totalItems() > 0) {
              <span class="cart-badge">{{ cart.totalItems() }}</span>
            }
          </div>
        </button>

        @if (isLoggedIn()) {
          <div class="user-profile-menu">
            <span class="welcome-text">Hola, <strong class="name">{{ currentUser()?.name || 'Cargando usuario...' }}</strong></span>
            <button class="btn-nav-secondary" routerLink="/profile">Mi Perfil</button>
            <button class="btn-logout" (click)="logout()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
          </div>
        } @else {
          <div class="auth-buttons">
            <button class="btn-nav-secondary" routerLink="/login">Ingresar</button>
            <button class="btn-nav-primary" routerLink="/register">Registrarse</button>
          </div>
        }
      </div>

    </div>
  </div>
</nav>
